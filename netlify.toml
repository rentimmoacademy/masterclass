[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirects: la racine sert l'opt-in, /masterclass sert la masterclass
[[redirects]]
  from = "/insta"
  to = "/?src=insta"
  status = 200

[[redirects]]
  from = "/tiktok"
  to = "/?src=tiktok"
  status = 200

[[redirects]]
  from = "/youtube"
  to = "/?src=youtube"
  status = 200

# Sécurité headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Empêcher l'accès direct à /masterclass.html via Google
[[headers]]
  for = "/masterclass.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
